name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: $-spm-$
          restore-keys: |
            $-spm-

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build
        run: xcodebuild clean build -project NetworkingTutorial/NetworkingTutorial.xcodeproj -scheme NetworkingTutorial -destination 'platform=iOS Simulator,name:Any iOS Simulator Device'
      
      - name: Run tests
        run: xcodebuild test -project NetworkingTutorial/NetworkingTutorial.xcodeproj -scheme NetworkingTutorial -destination 'platform=iOS Simulator,name:Any iOS Simulator Device'
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: path/to/test/results
